<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Music Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ── Dark theme overrides ─────────────────────────────────── */
    :root, [data-bs-theme=dark] {
      --bs-body-bg:        #0d0d0d;
      --bs-body-color:     #f0ece3;
      --bs-secondary-bg:   #1a1a1a;
      --bs-tertiary-bg:    #111111;
      --bs-border-color:   rgba(201,169,110,.16);
      --bs-card-bg:        #1a1a1a;
      --bs-card-border-color: rgba(201,169,110,.16);
      --gold: #c9a96e;
      --muted: #777;
    }

    html { font-size: 20px; }
    body { font-size: 1rem; }

    /* ── Sidebar ──────────────────────────────────────────────── */
    .sidebar {
      background: #111;
      border-right: 1px solid var(--bs-border-color);
    }
    @media (min-width: 768px) {
      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        width: 270px;
        flex-shrink: 0;
      }
    }
    .sidebar .nav-link {
      color: var(--muted);
      padding: .7rem 1.4rem;
      font-size: 1rem;
      border-left: 2px solid transparent;
      border-radius: 0;
    }
    .sidebar .nav-link:hover { color: #f0ece3; background: rgba(255,255,255,.03); }
    .sidebar .nav-link.active {
      color: var(--gold);
      background: rgba(201,169,110,.08);
      border-left-color: var(--gold);
    }
    .sb-logo-icon  { font-size: 1.5rem; color: var(--gold); line-height: 1; }
    .sb-logo-title { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .sb-logo-sub   { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; }

    /* ── Gold buttons ─────────────────────────────────────────── */
    .btn-gold {
      background: var(--gold); border-color: var(--gold);
      color: #111; font-weight: 600;
    }
    .btn-gold:hover { background: #dbbf80; border-color: #dbbf80; color: #111; }
    .btn-outline-gold {
      border-color: rgba(201,169,110,.35); color: var(--muted);
    }
    .btn-outline-gold:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Page header ──────────────────────────────────────────── */
    .page-title { font-size: 1.8rem; font-weight: 700; color: var(--gold); }

    /* ── Stat cards ───────────────────────────────────────────── */
    .stat-val       { font-size: 2.2rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-val.green { color: #4caf72; }
    .stat-val.red   { color: #d45a4a; }
    .stat-val.plain { color: #f0ece3; font-size: 1.55rem; }
    .stat-lbl       { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-top: .3rem; }

    /* ── Quality badges ───────────────────────────────────────── */
    .badge { font-size: .75rem; padding: .28em .65em; }
    .q-lossless { background: rgba(76,175,114,.15)  !important; color: #4caf72 !important; }
    .q-mixed    { background: rgba(74,184,200,.15)  !important; color: #4ab8c8 !important; }
    .q-high     { background: rgba(212,184,74,.15)  !important; color: #d4b84a !important; }
    .q-medium   { background: rgba(212,132,74,.15)  !important; color: #d4844a !important; }
    .q-low      { background: rgba(212,90, 74,.15)  !important; color: #d45a4a !important; }

    /* ── Table ────────────────────────────────────────────────── */
    .table { font-size: 1rem; }
    .table thead th {
      font-size: .78rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); cursor: pointer; user-select: none;
      background: #111; position: sticky; top: 0;
      border-color: var(--bs-border-color);
      transition: color .12s;
    }
    .table thead th:hover, .table thead th.sorted { color: var(--gold); }
    .table thead th .arr { opacity: .35; margin-left: .3rem; font-size: .72rem; }
    .table thead th.sorted .arr { opacity: 1; }
    .table tbody tr:hover td { background: rgba(201,169,110,.04) !important; }

    /* ── Find-lossless links ──────────────────────────────────── */
    .lnk-pill {
      font-size: .8rem; color: var(--muted); text-decoration: none;
      padding: .12rem .42rem;
      border: 1px solid rgba(255,255,255,.1); border-radius: 3px;
      transition: color .12s, border-color .12s;
    }
    .lnk-pill:hover { color: var(--gold); border-color: var(--gold); }

    /* ── Gold form focus ──────────────────────────────────────── */
    .form-control:focus, .form-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 .2rem rgba(201,169,110,.18);
    }

    /* ── Filter buttons ───────────────────────────────────────── */
    .filter-bar .btn { font-size: .88rem; }
    .filter-bar .btn.on { border-color: var(--gold); color: var(--gold); }

    /* ── Progress ─────────────────────────────────────────────── */
    .progress { background: rgba(255,255,255,.05); height: 6px; }
    .progress-bar { background: var(--gold); }

    /* ── Mobile top bar ───────────────────────────────────────── */
    .mobile-bar {
      background: #111;
      border-bottom: 1px solid var(--bs-border-color);
    }
  </style>
</head>
<body class="d-flex" style="min-height:100vh">

  <!-- ── Sidebar (offcanvas on mobile, sticky on md+) ─────────── -->
  <div class="offcanvas-md offcanvas-start sidebar" id="navSidebar" tabindex="-1"
       style="width:270px">
    <!-- Mobile offcanvas header -->
    <div class="offcanvas-header border-bottom d-md-none py-3">
      <span class="sb-logo-title">&#9835; Music Manager</span>
      <button type="button" class="btn-close"
              data-bs-dismiss="offcanvas" data-bs-target="#navSidebar"></button>
    </div>

    <div class="offcanvas-body p-0 d-flex flex-column">
      <!-- Desktop logo -->
      <div class="d-none d-md-block px-4 py-3 border-bottom">
        <div class="sb-logo-icon">&#9835;</div>
        <div class="sb-logo-title mt-1">Music Manager</div>
        <div class="sb-logo-sub text-muted mt-1">Collection Tools</div>
      </div>

      <!-- Nav -->
      <nav class="nav flex-column py-2 flex-grow-1">
        <a href="/?db={{ db_path }}"
           class="nav-link {{ 'active' if active_page == 'dashboard' }}">
          &#9672;&nbsp; Dashboard
        </a>
        <a href="/albums?db={{ db_path }}"
           class="nav-link {{ 'active' if active_page == 'albums' }}">
          &#9783;&nbsp; Albums
        </a>
        <a href="/scan?db={{ db_path }}"
           class="nav-link {{ 'active' if active_page == 'scan' }}">
          &#8853;&nbsp; Scan Library
        </a>
        <a href="/organise?db={{ db_path }}"
           class="nav-link {{ 'active' if active_page == 'organise' }}">
          &#8862;&nbsp; Organise
        </a>
      </nav>

      <!-- DB path -->
      <div class="px-4 py-3 border-top">
        <div class="sb-logo-sub text-muted">Database</div>
        <div class="small mt-1" style="color:#f0ece3;opacity:.55;word-break:break-all">
          {{ db_path }}
        </div>
      </div>
    </div>
  </div>

  <!-- ── Main wrapper ──────────────────────────────────────────── -->
  <div class="flex-grow-1 d-flex flex-column" style="min-height:100vh;min-width:0">

    <!-- Mobile top bar -->
    <div class="mobile-bar d-flex d-md-none align-items-center px-3 py-2">
      <button class="btn btn-sm btn-outline-secondary me-3"
              data-bs-toggle="offcanvas" data-bs-target="#navSidebar">&#9776;</button>
      <span class="sb-logo-title">&#9835; Music Manager</span>
    </div>

    <!-- Page content -->
    <main class="flex-grow-1 p-5">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
